    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

            <button onclick="nav('profil')" class="hover:text-sky-600 transition">Profil</button>

        </button>
        <button onclick="nav('daftar')" class="text-slate-400 focus:text-sky-600 flex flex-col items-center gap-1">

            { id: "smksyppkyoseph", name: "SMKS YPPK ST. Yoseph Calanz", address: "Karadiri", map: "https://maps.google.com/?q=SMK+ST+Yoseph+Nabire", img: "https://iili.io/BiF2oZu.md.jpg", majors: ["Agribisnis Ternak Unggas (ATU)", "Agribisnis Pengolahan Hasil Pertanian (APHP)"] }
        ];

        let state = {
            view: 'home',
            user: JSON.parse(localStorage.getItem('user')) || null,
            registrations: JSON.parse(localStorage.getItem('registrations')) || [],
            news: JSON.parse(localStorage.getItem('news')) || [
                { id: 1, title: "Pembukaan PPDB 2026/2027", author: "Master Admin", content: "Pendaftaran siswa baru SMK se-Kabupaten Nabire resmi dibuka mulai hari ini.", date: "2026-02-15" }
            ],
            editData: null,
            selectedSchool: null
        };

        // --- CORE FUNCTIONS ---
        function toast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `p-4 rounded-xl shadow-xl text-white font-medium text-sm animate-fade-in ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} pointer-events-auto`;
            el.innerText = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function save() {
            localStorage.setItem('registrations', JSON.stringify(state.registrations));
            localStorage.setItem('news', JSON.stringify(state.news));
            localStorage.setItem('user', JSON.stringify(state.user));
        }

        function nav(v) {
            state.view = v;
            render();
            window.scrollTo(0,0);
        }

        function render() {
            const container = document.getElementById('content');
            container.className = "animate-fade-in";
            
            switch(state.view) {
                case 'home': container.innerHTML = viewHome(); break;
                case 'berita': container.innerHTML = viewBerita(); break;
                case 'profil': container.innerHTML = viewProfil(); break;
                case 'akademik': container.innerHTML = viewAkademik(); break;
                case 'daftar': container.innerHTML = viewDaftar(); break;
                case 'login': container.innerHTML = viewLogin(); break;
                case 'admin': container.innerHTML = viewAdmin(); break;
                default: container.innerHTML = viewHome();
            }
        }

        // --- VIEWS COMPONENTS ---
        function viewHome() {
            return `
                <section class="hero-bg h-[500px] flex flex-col items-center justify-center text-center px-6">

                        <div class="grid gap-4">
                            <div class="p-4 bg-sky-50 rounded-xl border border-sky-100 shadow-sm">
                                <h4 class="font-bold text-sky-800"><i class="fas fa-eye mr-2"></i> Visi</h4>
                                <p class="text-xs text-slate-600">Menjadi pusat koordinasi SMK yang unggul, inovatif, dan berstandar industri.</p>
                            </div>
                            <div class="p-4 bg-white rounded-xl border border-slate-100 shadow-sm">
                                <h4 class="font-bold text-slate-800"><i class="fas fa-bullseye mr-2"></i> Misi</h4>
                                <p class="text-xs text-slate-600">Meningkatkan kualitas lulusan SMK dan memperkuat jejaring kerja antar lembaga pendidikan.</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-8 custom-shadow border relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-5 text-8xl transform translate-x-10 -translate-y-10 rotate-12"><i class="fas fa-address-book"></i></div>
                        <h3 class="text-xl font-bold mb-6 text-sky-900">Hubungi Kami</h3>
                        <div class="space-y-5">
                            <div class="flex items-center gap-4 group">
                                <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center group-hover:bg-sky-600 group-hover:text-white transition-all duration-300"><i class="fas fa-phone"></i></div>
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Telepon</p><p class="font-medium text-slate-700">+62 812-4567-8901</p></div>
                            </div>
                            <div class="flex items-center gap-4 group">
                                <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center group-hover:bg-sky-600 group-hover:text-white transition-all duration-300"><i class="fas fa-envelope"></i></div>
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Email Resmi</p><p class="font-medium text-slate-700">admin@mkkssmknabire.or.id</p></div>
                            </div>
                            <div class="flex items-center gap-4 group">
                                <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center group-hover:bg-sky-600 group-hover:text-white transition-all duration-300"><i class="fab fa-instagram"></i></div>
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Media Sosial</p><p class="font-medium text-slate-700">@mkks_smk_nabire</p></div>

                        ${state.news.length ? state.news.map(n => `
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-xl hover:border-sky-200 transition-all duration-300 group">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-black text-sky-600 uppercase tracking-tighter bg-sky-50 px-2 py-1 rounded">${n.author}</span>

                                </div>
                                <h3 class="text-xl font-bold mb-3 group-hover:text-sky-600 transition">${n.title}</h3>
                                <p class="text-slate-600 leading-relaxed text-sm">${n.content}</p>

                        `).join('') : '<p class="text-center text-slate-400 py-20 italic">Belum ada berita terbaru.</p>'}
                    </div>
                </div>
            `;
        }

                                </div>
                                <p class="text-[11px] font-bold text-slate-700 leading-tight group-hover:text-sky-700 transition">${s.name}</p>
                                <p class="text-[9px] text-slate-400 mt-1 uppercase font-medium">Anggota MKKS</p>

                            <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 custom-shadow flex flex-col group">
                                <div class="h-44 relative overflow-hidden">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end p-6">
                                        <div class="w-full flex justify-between items-end">

                                            <a href="${s.map}" target="_blank" class="w-10 h-10 bg-white/20 hover:bg-sky-500 backdrop-blur-md rounded-xl flex items-center justify-center text-white transition-all shadow-lg border border-white/30" title="Buka di Google Maps">

                                            </a>
                                        </div>

                <div class="max-w-3xl mx-auto py-12 px-6">
                    <div class="bg-white rounded-[2.5rem] p-10 border border-slate-100 custom-shadow">
                        <div class="text-center mb-10">
                            <h2 class="text-2xl font-bold text-sky-900">${editMode ? 'Edit Data Pendaftar' : 'Formulir Pendaftaran Siswa'}</h2>
                            <p class="text-sm text-slate-400 mt-1 uppercase tracking-widest font-medium">Tahun Ajaran 2026/2027</p>
                        </div>
                        
                        <form onsubmit="handleDaftar(event)" class="space-y-6">
                            <div class="grid md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Nomor NISN</label>
                                    <input type="number" name="nisn" value="${state.editData?.nisn || ''}" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Nomor NIK</label>
                                    <input type="number" name="nik" value="${state.editData?.nik || ''}" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                </div>
                            </div>
                            
                            <div class="space-y-2">
                                <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Nama Lengkap Siswa</label>
                                <input type="text" name="nama" value="${state.editData?.nama || ''}" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                            </div>

                            <div class="grid md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Tempat, Tanggal Lahir</label>
                                    <input type="text" name="ttl" value="${state.editData?.ttl || ''}" placeholder="Contoh: Nabire, 12-05-2010" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Jenis Kelamin</label>
                                    <select name="jk" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                        <option value="Laki-laki" ${state.editData?.jk === 'Laki-laki' ? 'selected' : ''}>Laki-laki</option>
                                        <option value="Perempuan" ${state.editData?.jk === 'Perempuan' ? 'selected' : ''}>Perempuan</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid md:grid-cols-2 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Nomor HP/WA</label>
                                    <input type="tel" name="telepon" value="${state.editData?.telepon || ''}" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Asal Sekolah</label>
                                    <input type="text" name="asalSekolah" value="${state.editData?.asalSekolah || ''}" placeholder="SMP/MTs Asal" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                                </div>
                            </div>

                            <div class="p-6 bg-sky-50 rounded-3xl border border-sky-100 space-y-5">
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-sky-700 ml-1">Pilihan SMK</label>
                                    <select id="smk-select" name="smk" onchange="updateMajorsDropdown(this.value)" required class="w-full p-4 bg-white border border-sky-100 rounded-2xl outline-none focus:border-sky-500 transition">
                                        <option value="">-- Pilih Sekolah Tujuan --</option>
                                        ${SCHOOLS.map(s => `<option value="${s.name}" ${(state.editData?.smk || state.selectedSchool) === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[11px] font-black uppercase text-sky-700 ml-1">Pilihan Jurusan</label>
                                    <select id="major-select" name="jurusan" required class="w-full p-4 bg-white border border-sky-100 rounded-2xl outline-none focus:border-sky-500 transition">
                                        <option value="">-- Pilih Jurusan --</option>
                                    </select>
                                </div>
                            </div>

                            <div class="flex gap-4 pt-4">
                                ${editMode ? `<button type="button" onclick="cancelEdit()" class="flex-1 bg-slate-200 text-slate-700 py-4 rounded-2xl font-bold hover:bg-slate-300 transition">Batal</button>` : ''}
                                <button type="submit" class="flex-[2] bg-sky-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-sky-100 hover:bg-sky-700 transition uppercase tracking-widest">
                                    ${editMode ? 'Simpan Perubahan' : 'Kirim Pendaftaran'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            setTimeout(() => {
                const initSmk = state.editData?.smk || state.selectedSchool;
                if(initSmk) updateMajorsDropdown(initSmk, state.editData?.jurusan);
            }, 50);
        }

        function viewLogin() {
            return `
                <div class="max-w-md mx-auto py-24 px-6">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 custom-shadow text-center">
                        <div class="w-20 h-20 bg-sky-600 text-white rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-3xl shadow-xl shadow-sky-200 rotate-6"><i class="fas fa-shield-alt"></i></div>
                        <h2 class="text-2xl font-bold text-slate-800">Panel Administrator</h2>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2 mb-10">Otentikasi Petugas PPDB</p>
                        
                        <form onsubmit="handleLogin(event)" class="space-y-5 text-left">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Identitas Akun</label>
                                <select id="l-user" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition font-medium">
                                    <option value="mkkssmknabire">Master MKKS Nabire</option>
                                    ${SCHOOLS.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Kata Sandi</label>
                                <input type="password" id="l-pass" placeholder="Masukkan Password" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-sky-500 focus:bg-white transition">
                            </div>
                            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black hover:bg-black transition shadow-xl mt-4 uppercase tracking-wider text-xs">Akses Dashboard</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function viewAdmin() {
            if (!state.user) return viewLogin();
            
            const isMaster = state.user.role === 'master';
            let data = isMaster ? state.registrations : state.registrations.filter(r => r.smk === state.user.name);

            const stats = {
                total: data.length,
                lolos: data.filter(r => r.status === 'Lolos').length,
                tidak: data.filter(r => r.status === 'Tidak Lolos').length
            };

            return `
                <div class="max-w-6xl mx-auto py-10 px-6">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">${state.user.name}</h2>
                            <span class="text-[10px] font-black bg-sky-100 text-sky-700 px-3 py-1 rounded-full uppercase tracking-widest">Dashboard Verifikator</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="exportExcel()" class="bg-emerald-50 text-emerald-700 px-5 py-2.5 rounded-2xl text-xs font-bold border border-emerald-100 hover:bg-emerald-600 hover:text-white transition flex items-center gap-2">
                                <i class="fas fa-file-excel"></i> Ekspor Excel
                            </button>
                            <button onclick="logout()" class="bg-rose-50 text-rose-700 px-5 py-2.5 rounded-2xl text-xs font-bold border border-rose-100 hover:bg-rose-600 hover:text-white transition">
                                Log Out
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 custom-shadow">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-tighter mb-1">Total Masuk</p>
                            <h4 class="text-4xl font-black text-slate-800">${stats.total}</h4>
                        </div>
                        <div class="bg-emerald-50 p-8 rounded-[2.5rem] border border-emerald-100">
                            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-tighter mb-1">Terverifikasi</p>
                            <h4 class="text-4xl font-black text-emerald-700">${stats.lolos}</h4>
                        </div>
                        <div class="bg-rose-50 p-8 rounded-[2.5rem] border border-rose-100">
                            <p class="text-[10px] font-black text-rose-600 uppercase tracking-tighter mb-1">Ditolak</p>
                            <h4 class="text-4xl font-black text-rose-700">${stats.tidak}</h4>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2rem] border border-slate-100 custom-shadow overflow-hidden mb-12">
                        <div class="p-6 border-b bg-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="font-bold text-slate-700">Daftar Pendaftaran Baru</h3>
                            <div class="relative w-full md:w-64">
                                <i class="fas fa-search absolute left-4 top-3.5 text-slate-300 text-sm"></i>
                                <input type="text" placeholder="Cari Nama/NIK..." onkeyup="searchTable(this.value)" class="w-full pl-12 pr-4 py-3 bg-white border border-slate-100 rounded-2xl text-sm outline-none focus:border-sky-500">
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table id="data-table" class="w-full text-sm">
                                <thead class="bg-slate-50 border-b">
                                    <tr>
                                        <th class="p-5 text-left font-black text-slate-400 uppercase text-[10px]">Pendaftar</th>
                                        <th class="p-5 text-left font-black text-slate-400 uppercase text-[10px]">Sekolah / Jurusan</th>
                                        <th class="p-5 text-center font-black text-slate-400 uppercase text-[10px]">Status</th>
                                        <th class="p-5 text-center font-black text-slate-400 uppercase text-[10px]">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y">
                                    ${data.map(r => `
                                        <tr class="hover:bg-slate-50 transition">
                                            <td class="p-5">
                                                <div class="font-bold text-slate-800 leading-tight">${r.nama}</div>
                                                <div class="text-[10px] text-slate-400 font-medium">NIK: ${r.nik} | NISN: ${r.nisn}</div>
                                            </td>
                                            <td class="p-5">
                                                <div class="font-semibold text-sky-800">${r.smk}</div>
                                                <div class="text-[10px] text-slate-500 font-medium">${r.jurusan}</div>
                                            </td>
                                            <td class="p-5 text-center">
                                                <span class="px-4 py-1.5 rounded-xl text-[9px] font-black uppercase tracking-widest ${r.status === 'Lolos' ? 'bg-emerald-100 text-emerald-700' : (r.status === 'Tidak Lolos' ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-400')}">
                                                    ${r.status}
                                                </span>
                                            </td>
                                            <td class="p-5">
                                                <div class="flex justify-center gap-2">
                                                    ${!isMaster ? `
                                                        <button onclick="updateStatus('${r.id}', 'Lolos')" class="w-9 h-9 rounded-xl bg-emerald-500 text-white flex items-center justify-center hover:scale-110 shadow-lg shadow-emerald-100 transition"><i class="fas fa-check text-xs"></i></button>
                                                        <button onclick="updateStatus('${r.id}', 'Tidak Lolos')" class="w-9 h-9 rounded-xl bg-rose-500 text-white flex items-center justify-center hover:scale-110 shadow-lg shadow-rose-100 transition"><i class="fas fa-times text-xs"></i></button>
                                                    ` : ''}
                                                    <button onclick="triggerEdit('${r.id}')" class="w-9 h-9 rounded-xl bg-sky-600 text-white flex items-center justify-center hover:scale-110 shadow-lg shadow-sky-100 transition"><i class="fas fa-edit text-xs"></i></button>
                                                    <button onclick="deletePendaftar('${r.id}')" class="w-9 h-9 rounded-xl bg-slate-800 text-white flex items-center justify-center hover:scale-110 shadow-lg shadow-slate-100 transition"><i class="fas fa-trash-alt text-xs"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).reverse().join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- HANDLERS ---
        function updateMajorsDropdown(schoolName, selectedMajor = "") {
            const dropdown = document.getElementById('major-select');
            const school = SCHOOLS.find(s => s.name === schoolName);
            if (!school) { dropdown.innerHTML = '<option value="">-- Pilih Jurusan --</option>'; return; }
            dropdown.innerHTML = school.majors.map(m => `<option value="${m}" ${m === selectedMajor ? 'selected' : ''}>${m}</option>`).join('');
        }

        function selectSchoolForDaftar(schoolName) { state.selectedSchool = schoolName; nav('daftar'); }

        function handleDaftar(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            const data = Object.fromEntries(form.entries());
            const isDuplicate = state.registrations.some(r => (r.nik === data.nik || r.nisn === data.nisn) && r.id !== state.editData?.id);
            if (isDuplicate) { toast("Data Gagal Dikirim! NIK/NISN sudah terdaftar.", "error"); return; }
            if (state.editData) {
                const idx = state.registrations.findIndex(r => r.id === state.editData.id);
                state.registrations[idx] = { ...state.registrations[idx], ...data };
                state.editData = null;
                toast("Data berhasil diperbarui.");
            } else {
                data.id = Date.now().toString();
                data.status = 'Pending';
                data.date = new Date().toISOString().split('T')[0];
                state.registrations.push(data);
                toast("Pendaftaran Berhasil Dikirim!");
            }
            save();
            state.selectedSchool = null;
            nav('home');
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('l-user').value;
            const pass = document.getElementById('l-pass').value;
            if (user === 'mkkssmknabire' && pass === 'Master12345') {
                state.user = { role: 'master', name: 'MKKS SMK Nabire' };
            } else if (pass === 'Admin12345') {
                const school = SCHOOLS.find(s => s.id === user);
                state.user = { role: 'admin', name: school.name };
            } else { toast("Password Salah!", "error"); return; }
            save(); nav('admin'); toast(`Selamat Datang, ${state.user.name}`);
        }

        function logout() { state.user = null; save(); nav('home'); toast("Log out sukses."); }
        function updateStatus(id, status) { 
            const idx = state.registrations.findIndex(r => r.id === id);
            state.registrations[idx].status = status; save(); render(); toast(`Status diperbarui ke ${status}`);
        }
        function deletePendaftar(id) { if (!confirm("Hapus data?")) return; state.registrations = state.registrations.filter(r => r.id !== id); save(); render(); }
        function triggerEdit(id) { state.editData = state.registrations.find(r => r.id === id); nav('daftar'); }
        function cancelEdit() { state.editData = null; nav('admin'); }

        function searchTable(q) {
            const rows = document.querySelectorAll('#data-table tbody tr');
            rows.forEach(r => { r.style.display = r.innerText.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'; });
        }

        function exportExcel() {
            const dataToExport = state.user.role === 'master' ? state.registrations : state.registrations.filter(r => r.smk === state.user.name);
            if (!dataToExport.length) return toast("Data kosong.", "error");
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data_Pendaftar");
            XLSX.writeFile(wb, `PPDB_NABIRE_${new Date().getFullYear()}.xlsx`);
        }

        render();
    </script>
</body>
</html>
